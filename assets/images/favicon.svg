<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a58ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f0ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bgGrad)" />

  <!-- Subtle inner shadow ring -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Medical cross (horizontal bar) -->
  <rect x="14" y="26" width="36" height="12" rx="4" ry="4" fill="url(#crossGrad)"/>

  <!-- Medical cross (vertical bar) -->
  <rect x="26" y="14" width="12" height="36" rx="4" ry="4" fill="url(#crossGrad)"/>

  <!-- Teal accent dot (bottom-right) — brand teal #20c997 -->
  <circle cx="50" cy="50" r="7" fill="#20c997"/>
  <path d="M47.2 50.2 l2 2 l4-4" stroke="white" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
