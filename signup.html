<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - MedCode | Medical Billing</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/index.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

  <!-- Header / Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top glass-card">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-file-medical text-primary-custom"></i>
        <span>MedCode</span>
      </a>

      <div class="d-flex align-items-center gap-3 ms-auto">
        <button id="theme-toggle" class="btn btn-link nav-link px-0" aria-label="Toggle theme">
          <i id="theme-icon" class="bi bi-moon-fill fs-5"></i>
        </button>
        <a href="login.html" class="btn btn-outline-custom d-none d-sm-inline-block">Login</a>
      </div>
    </div>
  </nav>

  <!-- Signup Section -->
  <section class="auth-wrapper position-relative" style="background: linear-gradient(rgba(32, 201, 151, 0.85), rgba(33, 37, 41, 0.9)), url('https://images.unsplash.com/photo-1551076805-e1869033e561?auto=format&fit=crop&w=1920&q=80') no-repeat center center / cover;">
    <div class="container py-5 d-flex justify-content-center">
      <div data-aos="zoom-in" class="bg-card glass-card hover-elevate rounded-4 shadow-lg border border-light p-4 p-md-5 w-100 position-relative z-1" style="max-width: 500px; background-color: var(--card-bg);">
        <a href="index.html" class="text-decoration-none text-muted small fw-medium mb-4 d-inline-block hover-opacity">
          <i class="bi bi-arrow-left me-1"></i> Back to Home
        </a>
        <div class="text-center mb-4">
              <h2 class="fw-bold mb-2">Create Account</h2>
              <p class="text-muted">Start optimizing your given revenue cycle today.</p>
            </div>
            
            <form action="dashboard.html" method="get">
              <div class="row g-3 mb-3">
                <div class="col-sm-6">
                  <label for="firstName" class="form-label fw-medium">First name</label>
                  <input type="text" class="form-control" id="firstName" placeholder="John" required>
                </div>
                <div class="col-sm-6">
                  <label for="lastName" class="form-label fw-medium">Last name</label>
                  <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
                </div>
              </div>
              
              <div class="mb-3">
                <label for="practiceName" class="form-label fw-medium">Practice Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-building"></i></span>
                  <input type="text" class="form-control border-start-0 ps-0" id="practiceName" placeholder="Doe Medical Group" required>
                </div>
              </div>
              
              <div class="mb-3">
                <label for="email" class="form-label fw-medium">Work Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="name@practice.com" required>
                </div>
              </div>
              
              <div class="mb-4">
                <label for="password" class="form-label fw-medium">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Create a strong password" required>
                </div>
                <div class="form-text small">Must be at least 8 characters long.</div>
              </div>
              
              <button type="submit" class="btn btn-primary-custom w-100 mb-3">Create Account</button>
            </form>
            
            <div class="divider">or continue with</div>
            
            <div class="row g-3 mb-4">
              <div class="col-6">
                <a href="#" class="social-login-btn w-100">
                  <i class="bi bi-google text-danger"></i> Google
                </a>
              </div>
              <div class="col-6">
                <a href="#" class="social-login-btn w-100">
                  <i class="bi bi-microsoft text-info"></i> Microsoft
                </a>
              </div>
            </div>
            
            <p class="text-center text-muted small mb-0">
              Already have an account? <a href="login.html" class="text-primary-custom fw-bold text-decoration-none">Log in</a>
            </p>
      </div>
    </div>
  </section>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="assets/js/main.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
