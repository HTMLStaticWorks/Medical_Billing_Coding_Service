<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MedCode | Medical Billing</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/index.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>



  <!-- Login Section -->
  <section class="auth-wrapper"
    style="min-height: 100vh; background: linear-gradient(rgba(13, 110, 253, 0.85), rgba(33, 37, 41, 0.9)), url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=1920&q=80') no-repeat center center / cover;">
    
    <!-- RTL/LTR Toggle -->
    <button id="dir-toggle" class="dir-toggle-auth" aria-label="Toggle direction">
      RTL
    </button>
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle-auth" aria-label="Toggle theme">
      <i id="theme-icon" class="bi bi-moon-fill"></i>
    </button>

    <div class="container py-5 d-flex justify-content-center">
      <div class="bg-bg-color rounded-4 shadow-lg border border-light p-4 p-md-5 w-100 position-relative z-1"
        style="max-width: 450px; background-color: var(--card-bg);">

        <div class="text-center mb-4 mt-2">
          <a class="navbar-brand d-inline-block mb-3" href="index.html" style="font-size: 2rem;">
            <i class="bi bi-file-medical text-primary-custom"></i>
            <span class="fw-bold text-primary-custom">MedCode</span>
          </a>
          <h2 class="fw-bold mb-2">Welcome Back</h2>
          <p class="text-muted">Enter your details to access your MedCode dashboard.</p>
        </div>

        <form action="dashboard.html" method="get">
          <div class="mb-4">
            <label for="email" class="form-label fw-medium">Email address</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 text-muted"><i
                  class="bi bi-envelope"></i></span>
              <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="name@practice.com"
                required>
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-medium">Password</label>
            <div class="input-group mb-2">
              <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="••••••••"
                required>
            </div>
            <div class="d-flex justify-content-between align-items-center flex-nowrap">
              <div class="form-check mb-0">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-primary-custom text-decoration-none small fw-medium text-nowrap">Forgot
                password?</a>
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 mb-3">Login</button>
        </form>

        <div class="divider">or continue with</div>

        <div class="row row-cols-3 g-2 mb-4">
          <div class="col">
            <a href="#" class="social-login-btn w-100 h-100" aria-label="Login with Google">
              <i class="bi bi-google text-danger fs-4"></i>
            </a>
          </div>
          <div class="col">
            <a href="#" class="social-login-btn w-100 h-100" aria-label="Login with Microsoft">
              <i class="bi bi-microsoft text-info fs-4"></i>
            </a>
          </div>
          <div class="col">
            <a href="#" class="social-login-btn w-100 h-100" aria-label="Login with Apple">
              <i class="bi bi-apple fs-4"></i>
            </a>
          </div>
        </div>

        <p class="text-center text-muted small mb-0">
          Don't have an account? <a href="signup.html" class="text-primary-custom fw-bold text-decoration-none">Sign up
            for free</a>
        </p>
      </div>
    </div>
  </section>

  <!-- Fixed RTL Toggle Button -->
  <button id="rtl-toggle-fixed" title="Toggle RTL / LTR">RTL</button>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="assets/js/main.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ duration: 800, once: true });</script>
</body>

</html>
